<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <style>
      :root {
        color-scheme: light;
        --text: #202124;
        --muted: #5f6368;
        --border: #d8dee4;
        --bg: #ffffff;
        --code-bg: #f6f8fa;
        --link: #0969da;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
        line-height: 1.75;
      }

      main {
        width: min(920px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0 64px;
      }

      h1, h2, h3, h4 {
        line-height: 1.35;
      }

      h1 {
        margin-top: 0;
        padding-bottom: 0.35em;
        border-bottom: 1px solid var(--border);
      }

      a {
        color: var(--link);
      }

      img {
        display: block;
        max-width: 100%;
        height: auto;
        margin: 18px auto;
        border-radius: 6px;
      }

      blockquote {
        margin-left: 0;
        padding: 0.1em 1em;
        color: var(--muted);
        border-left: 4px solid var(--border);
      }

      code {
        padding: 0.15em 0.35em;
        border-radius: 4px;
        background: var(--code-bg);
      }

      pre {
        overflow-x: auto;
        padding: 16px;
        border-radius: 6px;
        background: var(--code-bg);
      }

      pre code {
        padding: 0;
        background: transparent;
      }

      table {
        display: block;
        width: 100%;
        overflow-x: auto;
        border-collapse: collapse;
      }

      th, td {
        padding: 8px 10px;
        border: 1px solid var(--border);
      }

      mjx-container {
        overflow-x: auto;
        overflow-y: hidden;
        max-width: 100%;
      }
    </style>
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [['$', '$'], ['\\(', '\\)']],
          displayMath: [['$$', '$$'], ['\\[', '\\]']],
          processEscapes: true,
          packages: {'[+]': ['ams']}
        },
        options: {
          skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
        }
      };
    </script>
    <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  </head>
  <body>
    <main>
      {{ content }}
    </main>
  </body>
</html>
